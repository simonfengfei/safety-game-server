<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>安全生产月二维码海报</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'PingFang SC', sans-serif; background: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .poster { width: 420px; padding: 40px 30px; background: linear-gradient(135deg, #b71c1c 0%, #E8362A 40%, #ff6f00 100%); border-radius: 20px; color: #fff; text-align: center; }
  .title { font-size: 28px; font-weight: 800; line-height: 1.4; margin-bottom: 8px; }
  .subtitle { font-size: 14px; opacity: 0.9; margin-bottom: 30px; }
  .qr-wrap { background: #fff; padding: 20px; border-radius: 16px; margin-bottom: 20px; }
  .qr-wrap img { width: 200px; height: 200px; display: block; margin: 0 auto; }
  .qr-url { font-size: 12px; color: #666; margin-top: 10px; word-break: break-all; }
  .tips { font-size: 13px; line-height: 1.6; opacity: 0.9; padding: 15px; background: rgba(255,255,255,0.15); border-radius: 10px; }
  .tips strong { color: #fff; }
  .footer { font-size: 11px; opacity: 0.7; margin-top: 20px; }
</style>
</head>
<body>
<div class="poster">
  <div class="title">人人讲安全<br>个个会应急</div>
  <div class="subtitle">排查整治风险隐患 · 2026安全生产月</div>
  <div class="qr-wrap">
    <div id="qrcode"></div>
    <div class="qr-url">http://192.168.3.180:3000</div>
  </div>
  <div class="tips">
    <strong>使用说明：</strong><br>
    1. 手机连接同一WiFi网络<br>
    2. 微信扫码或浏览器直接打开<br>
    3. 注册登录后即可上报隐患<br>
    4. 所有设备数据实时同步共享
  </div>
  <div class="footer">特斯拉南区安保团队 · 2026年6月</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
  try {
    new QRCode(document.getElementById('qrcode'), {
      text: 'http://192.168.3.180:3000',
      width: 200,
      height: 200,
      colorDark: '#1a1a2e',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
  } catch(e) {
    document.getElementById('qrcode').innerHTML = '<div style="width:200px;height:200px;background:#f5f5f5;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:14px;color:#999;border:2px dashed #ccc;">二维码生成中...</div>';
  }
</script>
</body>
</html>
