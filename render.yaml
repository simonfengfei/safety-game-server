services:
  - type: web
    name: safety-game
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        value: safety2026
      - key: DATABASE_URL
        fromDatabase:
          name: safety-db
          property: connectionString

databases:
  - name: safety-db
    plan: free
